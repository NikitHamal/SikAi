# Intentionally committed signing credentials — see README "Keystore note".
# These values are NOT secret. They exist so every CI build signs the APK with
# the same key, producing identical install/upgrade signatures across releases.
# Do NOT put AI provider API keys in this file. User-supplied AI keys are stored
# locally on-device via EncryptedSharedPreferences and never leave the device.
storeFile=release-keystore.jks
storePassword=sikai-release-store
keyAlias=sikai
keyPassword=sikai-release-key

# Backend base URL for the Cloudflare Worker that serves the downloadable
# content manifest. Override per-environment by editing this file.
backendBaseUrl=https://sikai.example.workers.dev

# Optional default provider keys. Leave blank in the repo. CI/users can fill these
# locally; user-supplied keys entered in Settings always take precedence.
geminiApiKey=
openrouterApiKey=

name: Android release

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: |
          short=$(git rev-parse --short=8 HEAD)
          echo "short_sha=$short" >> "$GITHUB_OUTPUT"
          echo "Short SHA: $short"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble release
        run: ./gradlew --no-daemon assembleRelease

      - name: Rename APK with short SHA
        id: apk
        run: |
          set -e
          src=$(find app/build/outputs/apk/release -maxdepth 2 -name "*.apk" | head -n1)
          if [ -z "$src" ]; then
            echo "No APK found under app/build/outputs/apk/release"; exit 1
          fi
          out_dir=build/dist
          mkdir -p "$out_dir"
          dest="$out_dir/SikAi-${{ steps.meta.outputs.short_sha }}.apk"
          cp "$src" "$dest"
          echo "Built: $dest ($(du -h "$dest" | cut -f1))"
          echo "apk_path=$dest" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename "$dest")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_name }}
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.apk.outputs.apk_path }}
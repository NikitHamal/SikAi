name: Android Release APK

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute short commit hash
        id: hash
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build release APK
        run: ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Locate signed APK
        id: locate
        run: |
          set -e
          src="$(ls app/build/outputs/apk/release/*.apk | head -1)"
          dest="SikAi-${{ steps.hash.outputs.short }}.apk"
          cp "$src" "$dest"
          echo "apk=$dest" >> "$GITHUB_OUTPUT"
          sha256sum "$dest" | tee "$dest.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SikAi-${{ steps.hash.outputs.short }}
          path: ${{ steps.locate.outputs.apk }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', steps.hash.outputs.short) }}
          name: SikAi ${{ steps.hash.outputs.short }}
          generate_release_notes: true
          files: |
            ${{ steps.locate.outputs.apk }}
            ${{ steps.locate.outputs.apk }}.sha256

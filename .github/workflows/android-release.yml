name: Android Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*', 'sikai-*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      - name: Clean
        run: ./gradlew clean
      - name: Unit tests
        run: ./gradlew test
      - name: Build release APK
        run: ./gradlew :app:assembleRelease
      - name: Rename APK
        id: apk
        shell: bash
        run: |
          SHORT_COMMIT_HASH="${GITHUB_SHA::7}"
          FINAL="SikAi-${SHORT_COMMIT_HASH}.apk"
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk "release-artifacts/${FINAL}"
          echo "short=${SHORT_COMMIT_HASH}" >> "$GITHUB_OUTPUT"
          echo "apk=release-artifacts/${FINAL}" >> "$GITHUB_OUTPUT"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SikAi-${{ steps.apk.outputs.short }}
          path: ${{ steps.apk.outputs.apk }}
          if-no-files-found: error
      - name: Create single APK GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sikai-${{ steps.apk.outputs.short }}
          name: SikAi ${{ steps.apk.outputs.short }}
          files: ${{ steps.apk.outputs.apk }}
          fail_on_unmatched_files: true
          make_latest: true
